name: GitHub Profile Summary Cards

on:
  schedule:
    # Regenerate the stat cards once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Public stats via the built-in token — always valid, zero maintenance.
          # To ALSO count PRIVATE-repo contributions: set the SUMMARY_TOKEN secret to
          # a classic PAT that has BOTH the 'repo' AND 'read:user' scopes, then change
          # the line below to:
          #   GITHUB_TOKEN: ${{ secrets.SUMMARY_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 5
          AUTO_PUSH: true
