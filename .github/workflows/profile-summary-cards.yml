name: GitHub Profile Summary Cards

on:
  schedule:
    # Regenerate the stat cards once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Personal token (SUMMARY_TOKEN) with 'repo' + 'read:user' scopes so
          # PRIVATE-repo contributions are counted. Falls back to the built-in
          # public-only token if the secret is ever removed.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 5
          AUTO_PUSH: true
